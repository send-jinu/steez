<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STEEZ Runner</title>
<style>
  * { box-sizing: border-box; }
  body { margin:0; padding:24px 16px; background:#1F1B17; font-family: -apple-system, 'Pretendard', sans-serif; display:flex; flex-direction:column; align-items:center; min-height:100vh; }
  #splash { position:fixed; inset:0; background:#1F1B17; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:50; transition: opacity 0.5s ease, visibility 0.5s ease; }
  #splash.hide { opacity:0; visibility:hidden; pointer-events:none; }
  .splashStage { position:relative; width:280px; height:280px; display:flex; align-items:center; justify-content:center; }
  #splash img { width: 180px; opacity:0; animation: charInOut 0.65s ease-out 0.1s forwards; }
  @keyframes charInOut { 0%{ opacity:0; transform:scale(0.85);} 30%{ opacity:1; transform:scale(1);} 40%{ opacity:1; transform:scale(1);} 100%{ opacity:0; transform:scale(1.03);} }
  .splashLogo { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); opacity:1; animation: logoWipe 1.8s linear 0.5s both; }
  .splashLogo svg { width:220px; height:auto; }
  @keyframes logoWipe {
    0%   { clip-path: inset(0 100% 0 0); }
    22%  { clip-path: inset(0 0% 0 0); }
    78%  { clip-path: inset(0 0% 0 0); }
    100% { clip-path: inset(0 0% 0 100%); }
  }
  .gameArea { opacity:0; transition: opacity 0.6s ease; width:100%; display:flex; flex-direction:column; align-items:center; }
  .gameArea.show { opacity:1; }
  .logoWrap { width:100%; max-width:720px; display:flex; justify-content:center; margin-bottom:6px; }
  .logoWrap svg { width: 160px; height: auto; }
  .hint { color:#B8543A; font-size:13px; margin-bottom:14px; text-align:center; }
  .frame { position:relative; width:100%; max-width:720px; border-radius:12px; overflow:hidden; border:2px solid #333; background:#F4F1EC; }
  canvas { display:block; }
  #overlay { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; }
  #overlay img { width: 54px; opacity:0.9; margin-bottom:2px; }
</style>
</head>

  jumpAudio.preload = 'auto';
  deathAudio.preload = 'auto';

  function stopAllSounds(){
    jumpAudio.pause(); jumpAudio.currentTime = 0;
    deathAudio.pause(); deathAudio.currentTime = 0;
  }
  function playJumpSound(){
    jumpAudio.currentTime = 0;
    jumpAudio.play().catch(function(){});
  }
  function playDeathSound(){
    deathAudio.currentTime = 0;
    deathAudio.play().catch(function(){});
  }

  function reset(){
    stopAllSounds();
    state = 'playing';
    score = 0; elapsed = 0;
    obstacles = []; spawnTimer = 0;
    chicken.y = groundY; chicken.vy = 0; chicken.jumping = false;
    document.getElementById('overlay').style.display = 'none';
  }

  function jump(){
    if(!spriteReady) return;
    if(state === 'ready' || state === 'over'){ reset(); return; }
    if(state === 'playing' && !chicken.jumping){ chicken.vy = JUMP_V; chicken.jumping = true; playJumpSound(); }
  }

  frame.style.cursor = 'pointer';
  frame.addEventListener('mousedown', jump);
  frame.addEventListener('touchstart', function(e){ e.preventDefault(); jump(); }, { passive: false });
  frame.addEventListener('click', jump);
  document.addEventListener('keydown', function(e){ if(e.code === 'Space'){ e.preventDefault(); jump(); } });

  var LEVEL_DURATION = 480; // 8초마다 한 단계씩

  function currentLevel(){
    return Math.floor(elapsed / LEVEL_DURATION);
  }

  function currentSpeed(){
    var level = Math.min(currentLevel(), 10); // 최대 10단계까지
    return walkSpeed + level * 0.85;
  }

  function drawBackground(speed){
    var t = (Date.now() % CYCLE_MS) / CYCLE_MS;
    var night = (1 - Math.cos(2*Math.PI*t)) / 2;

    ctx.fillStyle = lerpColor(DAY.sky, NIGHT.sky, night);
    ctx.fillRect(0,0,LOGICAL_W,LOGICAL_H);

    if(night > 0.15){
      ctx.globalAlpha = Math.min((night-0.15)/0.5, 1);
      stars.forEach(function(st){ ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(st.x, st.y, st.r, 0, Math.PI*2); ctx.fill(); });
      ctx.globalAlpha = 1;
    }
    ctx.fillStyle = lerpColor(DAY.sun, NIGHT.sun, night);
    ctx.beginPath(); ctx.arc(330, 28, 11, 0, Math.PI*2); ctx.fill();

    cloudOffset -= 0.1;
    ctx.globalAlpha = 1 - night*0.7;
    ctx.fillStyle = '#ffffff';
    clouds.forEach(function(c){
      var cx = ((c.x + cloudOffset) % (LOGICAL_W + 60) + (LOGICAL_W + 60)) % (LOGICAL_W + 60) - 30;
      ctx.beginPath();
      ctx.ellipse(cx, c.y, 14*c.s, 7*c.s, 0, 0, Math.PI*2);
      ctx.ellipse(cx + 12*c.s, c.y + 2, 10*c.s, 6*c.s, 0, 0, Math.PI*2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    buildOffsetFar -= Math.max(speed*0.08, 0.15);
    if(buildOffsetFar < -buildingsFarWidth) buildOffsetFar += buildingsFarWidth;
    ctx.fillStyle = lerpColor(DAY.bFar, NIGHT.bFar, night);
    buildingsFar.forEach(function(b){
      for(var rep=-1; rep<=1; rep++){
        var xx = b.x + buildOffsetFar + rep*buildingsFarWidth;
        if(xx > -60 && xx < LOGICAL_W+20) ctx.fillRect(xx, groundY - b.h + 4, b.w, b.h);
      }
    });

    buildOffsetNear -= Math.max(speed*0.35, 0.5);
    if(buildOffsetNear < -buildingsNearWidth) buildOffsetNear += buildingsNearWidth;
    ctx.fillStyle = lerpColor(DAY.bNear, NIGHT.bNear, night);
    buildingsNear.forEach(function(b){
      for(var rep=-1; rep<=1; rep++){
        var xx = b.x + buildOffsetNear + rep*buildingsNearWidth;
        if(xx > -60 && xx < LOGICAL_W+20){
          ctx.fillRect(xx, groundY - b.h + 4, b.w, b.h);
          if(night > 0.3){
            ctx.globalAlpha = (night-0.3)/0.7;
            b.lit.forEach(function(win){ if(win.on){ ctx.fillStyle = '#F4C775'; ctx.fillRect(xx+win.x, groundY - b.h + 4 + win.y, 3, 4); } });
            ctx.fillStyle = lerpColor(DAY.bNear, NIGHT.bNear, night);
            ctx.globalAlpha = 1;
          }
        }
      }
    });

    ctx.strokeStyle = lerpColor(DAY.ground, NIGHT.ground, night); ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(0, groundY + 8); ctx.lineTo(LOGICAL_W, groundY + 8); ctx.stroke();

    return night;
  }

  function drawChicken(night){
    if(!spriteReady) return;
    var gx = chicken.x, gy = chicken.y;

    if(!chicken.jumping){
      // 러닝: 보드가 이미 그림에 포함됨. 푸시킥 동작(밀었다가 회복하는 리듬)을 흉내
      var period = 42;
      var phase = elapsed % period;
      var lean, bounce;
      if(phase < 14){
        lean = (phase / 14) * 5;       // 미는 동작: 앞으로 기울임
        bounce = (phase / 14) * 1.6;
      } else {
        var t = (phase - 14) / (period - 14);
        lean = 5 * (1 - t);            // 회복: 원위치로
        bounce = 1.6 * (1 - t);
      }
      ctx.save();
      ctx.translate(gx, gy - bounce);
      ctx.rotate(lean * Math.PI / 180);
      ctx.globalAlpha = 1 - night*0.2;
      ctx.drawImage(spriteRun, -SPR_RUN_W/2, -SPR_RUN_H + 4, SPR_RUN_W, SPR_RUN_H);
      ctx.globalAlpha = 1;
      ctx.restore();
    } else {
      // 점프: 서 있는 이미지 + 코드로 그린 보드(왼쪽 이미지와 같은 톤)
      ctx.save();
      ctx.translate(gx, gy);
      ctx.rotate(-6 * Math.PI / 180);
      ctx.scale(1, 1.06);
      ctx.globalAlpha = 1 - night*0.2;
      ctx.drawImage(spriteJump, -SPR_JUMP_W/2, -SPR_JUMP_H + 4, SPR_JUMP_W, SPR_JUMP_H);
      ctx.globalAlpha = 1;
      ctx.restore();

      var boardY = gy + 1;
      ctx.drawImage(boardImg, gx - BOARD_W/2, boardY, BOARD_W, BOARD_H);
    }
  }

  var OBSTACLE_TYPES = ['cat', 'dog', 'cone', 'bin', 'trashbag', 'hydrant', 'pigeon'];
  var OBS_ASPECT = { cat: 31/40, dog: 39/40, cone: 58/70, bin: 74/78, trashbag: 56/68, hydrant: 35/60, pigeon: 115/60 };
  function drawObstacle(o){
    var top = groundY - o.h + 4;
    ctx.drawImage(obsImgs[o.type], o.x, top, o.w, o.h);
  }

  function loop(){
    requestAnimationFrame(loop);
    var speed = currentSpeed();
    var night = drawBackground(speed);

    if(state === 'playing' && spriteReady){
      elapsed += 1;
      score = Math.floor(elapsed / 6);

      chicken.vy += GRAV;
      chicken.y += chicken.vy;
      if(chicken.y > groundY){ chicken.y = groundY; chicken.vy = 0; chicken.jumping = false; }

      spawnTimer -= 1;
      if(spawnTimer <= 0){
        var type = OBSTACLE_TYPES[Math.floor(Math.random()*OBSTACLE_TYPES.length)];
        var h;
        if(type === 'pigeon'){ h = 23 + Math.random()*2; }
        else if(type === 'cat' || type === 'dog'){ h = 28 + Math.random()*4; }
        else if(type === 'bin'){ h = 35 + Math.random()*4; }
        else { h = 33 + Math.random()*7; } // cone, trashbag, hydrant
        var w = h * OBS_ASPECT[type];
        obstacles.push({ x: LOGICAL_W + 10, w: w, h: h, type: type });
        var lvl = Math.min(currentLevel(), 10);
        var minFrames = lvl < 7 ? 50 : Math.max(50 - (lvl-6)*10, 18); // 레벨 7부터 최소값이 줄어들어 9~10에서 거의 연속 점프 수준
        var speedRatio = walkSpeed / speed; // 속도가 오른 만큼 정확히 반비례로 줄어듦
        var baseFrames = Math.max(78 * speedRatio, minFrames + 3); // 빈도가 속도 증가율에 비례해서 늘어남
        var raw = baseFrames * (0.7 + Math.random()*0.6); // 불규칙한 편차
        spawnTimer = Math.max(raw, minFrames);
      }
      for(var i = obstacles.length - 1; i >= 0; i--){
        obstacles[i].x -= speed;
        if(obstacles[i].x < -25) obstacles.splice(i, 1);
        else {
          var o = obstacles[i];
          var curW = chicken.jumping ? SPR_JUMP_W : SPR_RUN_W;
          var cLeft = chicken.x - curW/2 + 8, cRight = chicken.x + curW/2 - 8, cBottom = chicken.y;
          var oTop = groundY - o.h + 4;
          if(cRight > o.x && cLeft < o.x + o.w && cBottom > oTop){
            state = 'over';
            playDeathSound();
            if(score > best) best = score;
            var ov = document.getElementById('overlay');
            ov.innerHTML = '<div style="font-size:20px; font-weight:500; color:#1F1B17; background:rgba(244,241,236,0.85); padding:4px 14px; border-radius:8px;">score ' + score + '</div><div style="font-size:13px; color:#6b6560; margin-top:6px; background:rgba(244,241,236,0.85); padding:2px 10px; border-radius:6px;">best ' + best + '</div><div style="font-size:13px; color:#B8543A; margin-top:10px; background:rgba(244,241,236,0.85); padding:2px 10px; border-radius:6px;">tap to retry</div>';
            ov.style.display = 'flex';
          }
        }
      }
    }

    obstacles.forEach(drawObstacle);
    drawChicken(night);

    if(state === 'playing'){
      ctx.fillStyle = night > 0.5 ? '#F4F1EC' : '#1F1B17';
      ctx.font = '13px sans-serif';
      ctx.fillText('score ' + score, LOGICAL_W - 70, 20);
    }
  }
  loop();
}catch(err){
  var ov = document.getElementById('overlay');
  if(ov){ ov.innerHTML = '<div style="font-size:12px; color:#B8543A; text-align:center; padding:0 16px;">오류: ' + (err && err.message ? err.message : err) + '</div>'; }
}
})();
</script>
